name: Java CI with Maven

on:
  push:
    branches:
      - 'feature/*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/main.api/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build application
        working-directory: ./backend
        run: mvn clean package -Dmaven.compiler.showWarnings=false

      - name: Configure Git to Use HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://".insteadOf "ssh://"

      - name: Extract Branch Name
        id: extract_branch
        run: echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.TOKEN }}
          commit-message: 'Build successful - creating PR'
          branch: main
          base: ${{ env.branch_name }}                   
          title: 'Pull Request from ${{ env.branch_name }}'
          body: 'This PR is automatically generated from ${{ env.branch_name }} after a successful build.'
